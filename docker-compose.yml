services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_gt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_gt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  web-node-modules: